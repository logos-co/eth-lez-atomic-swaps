[package]
name = "swap-orchestrator"
version = "0.1.0"
edition = "2024"

[dependencies]
# Ethereum
alloy = { version = "1", features = [
    "provider-ws",
    "signer-local",
    "contract",
    "sol-types",
    "network",
    "rpc-types",
    "node-bindings",
] }
futures-util = "0.3"

# LEZ
nssa = { path = "../lssa/nssa" }
nssa_core = { path = "../lssa/nssa/core", features = ["host"] }
common = { path = "../lssa/common" }
# LEZ HTLC types (HTLCInstruction, HTLCEscrow, HTLCState)
lez_htlc_program = { path = "programs/lez-htlc/methods/guest" }

# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time", "macros"] }

# Crypto
sha2 = "0.10"
rand = { version = "0.8", features = ["std", "std_rng"] }

# Error handling
thiserror = "2"

# Logging
tracing = "0.1"

# Environment
dotenvy = "0.15"

# Utilities
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
borsh = "1.5"

[dev-dependencies]
alloy = { version = "1", features = [
    "provider-ws",
    "signer-local",
    "contract",
    "sol-types",
    "network",
    "rpc-types",
    "node-bindings",
    "provider-anvil-node",
] }
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time", "macros", "test-util"] }
